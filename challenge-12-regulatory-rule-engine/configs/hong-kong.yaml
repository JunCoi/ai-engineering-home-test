country: Hong Kong
country_code: hong-kong
rules:
  - rule_id: HK-DOC-001
    description: Medical receipt is required for all claims
    rule_type: document_requirement
    effective_date: "2024-01-01"
    parameters:
      required_documents: [medical_receipt]
  - rule_id: HK-DOC-002
    description: Referral letter is required for specialist claims
    rule_type: document_requirement
    effective_date: "2024-01-01"
    parameters:
      required_documents: [referral_letter]
      applies_to:
        claim_types: [specialist]
  - rule_id: HK-DOC-003
    description: Discharge summary is required for inpatient claims
    rule_type: document_requirement
    effective_date: "2024-01-01"
    parameters:
      required_documents: [discharge_summary]
      applies_to:
        claim_types: [inpatient]
  - rule_id: HK-SLA-001
    description: All claims must be processed within 20 business days
    rule_type: sla_check
    effective_date: "2024-01-01"
    parameters:
      max_business_days: 20
  - rule_id: HK-WAIT-GEN-001
    description: General claims require a 60-day waiting period
    rule_type: waiting_period
    effective_date: "2024-01-01"
    parameters:
      minimum_policy_age_days: 60
      applies_to:
        condition_types: [general]
  - rule_id: HK-WAIT-PEC-001
    description: Pre-existing condition claims require a 180-day waiting period
    rule_type: waiting_period
    effective_date: "2024-01-01"
    parameters:
      minimum_policy_age_days: 180
      applies_to:
        condition_types: [pre_existing]
  - rule_id: HK-MASK-001
    description: HKID must be masked in external reports
    rule_type: data_masking
    effective_date: "2024-01-01"
    parameters:
      field: hkid
      report_context: external
  - rule_id: HK-COV-001
    description: Mental health must be covered at the same level as physical health
    rule_type: coverage_mandate
    effective_date: "2024-06-01"
    parameters:
      required_coverage_level: same_as_physical
      applies_to:
        treatment_types: [mental_health]
