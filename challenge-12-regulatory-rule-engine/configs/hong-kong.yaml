country: Hong Kong
countryCode: hong-kong
rules:
  - ruleId: HK-DOC-001
    description: Medical receipt is required for all claims
    ruleType: DOCUMENT_REQUIREMENT
    effectiveDate: "2024-01-01"
    parameters:
      requiredDocuments: [MEDICAL_RECEIPT]
  - ruleId: HK-DOC-002
    description: Referral letter is required for SPECIALIST claims
    ruleType: DOCUMENT_REQUIREMENT
    effectiveDate: "2024-01-01"
    parameters:
      requiredDocuments: [REFERRAL_LETTER]
      appliesTo:
        claimTypes: [SPECIALIST]
  - ruleId: HK-DOC-003
    description: Discharge summary is required for INPATIENT claims
    ruleType: DOCUMENT_REQUIREMENT
    effectiveDate: "2024-01-01"
    parameters:
      requiredDocuments: [DISCHARGE_SUMMARY]
      appliesTo:
        claimTypes: [INPATIENT]
  - ruleId: HK-SLA-001
    description: All claims must be processed within 20 business days
    ruleType: SLA_CHECK
    effectiveDate: "2024-01-01"
    parameters:
      maxBusinessDays: 20
  - ruleId: HK-WAIT-GEN-001
    description: General claims require a 60-day waiting period
    ruleType: WAITING_PERIOD
    effectiveDate: "2024-01-01"
    parameters:
      minimumPolicyAgeDays: 60
      appliesTo:
        conditionTypes: [GENERAL]
  - ruleId: HK-WAIT-PEC-001
    description: Pre-existing condition claims require a 180-day waiting period
    ruleType: WAITING_PERIOD
    effectiveDate: "2024-01-01"
    parameters:
      minimumPolicyAgeDays: 180
      appliesTo:
        conditionTypes: [PRE_EXISTING]
  - ruleId: HK-MASK-001
    description: HKID must be masked in external reports
    ruleType: DATA_MASKING
    effectiveDate: "2024-01-01"
    parameters:
      field: hkid
      reportContext: external
  - ruleId: HK-COV-001
    description: Mental health must be covered at the same level as physical health
    ruleType: COVERAGE_MANDATE
    effectiveDate: "2024-06-01"
    parameters:
      requiredCoverageLevel: SAME_AS_PHYSICAL
      appliesTo:
        treatmentTypes: [MENTAL_HEALTH]
