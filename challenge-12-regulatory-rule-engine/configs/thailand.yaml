country: Thailand
countryCode: thailand
rules:
  - ruleId: TH-DOC-001
    description: Medical receipt is required for all claims
    ruleType: DOCUMENT_REQUIREMENT
    effectiveDate: "2024-01-01"
    parameters:
      requiredDocuments: [MEDICAL_RECEIPT]
  - ruleId: TH-DOC-002
    description: Discharge summary is required for INPATIENT claims
    ruleType: DOCUMENT_REQUIREMENT
    effectiveDate: "2024-01-01"
    parameters:
      requiredDocuments: [DISCHARGE_SUMMARY]
      appliesTo:
        claimTypes: [INPATIENT]
  - ruleId: TH-DOC-003
    description: Prescription is required for OUTPATIENT claims
    ruleType: DOCUMENT_REQUIREMENT
    effectiveDate: "2024-01-01"
    parameters:
      requiredDocuments: [PRESCRIPTION]
      appliesTo:
        claimTypes: [OUTPATIENT]
  - ruleId: TH-SLA-OUT-001
    description: Outpatient claims must be processed within 15 business days
    ruleType: SLA_CHECK
    effectiveDate: "2024-01-01"
    parameters:
      maxBusinessDays: 15
      appliesTo:
        claimTypes: [OUTPATIENT]
  - ruleId: TH-SLA-IN-001
    description: Inpatient claims must be processed within 30 business days
    ruleType: SLA_CHECK
    effectiveDate: "2024-01-01"
    parameters:
      maxBusinessDays: 30
      appliesTo:
        claimTypes: [INPATIENT]
  - ruleId: TH-WAIT-GEN-001
    description: General claims require a 30-day waiting period
    ruleType: WAITING_PERIOD
    effectiveDate: "2024-01-01"
    parameters:
      minimumPolicyAgeDays: 30
      appliesTo:
        conditionTypes: [GENERAL]
  - ruleId: TH-WAIT-PEC-001
    description: Pre-existing condition claims require a 120-day waiting period
    ruleType: WAITING_PERIOD
    effectiveDate: "2024-01-01"
    parameters:
      minimumPolicyAgeDays: 120
      appliesTo:
        conditionTypes: [PRE_EXISTING]
  - ruleId: TH-MASK-001
    description: National ID must show last 4 digits only in external reports
    ruleType: DATA_MASKING
    effectiveDate: "2024-01-01"
    parameters:
      field: nationalId
      reportContext: external
  - ruleId: TH-COV-001
    description: Emergency treatment must be covered regardless of network
    ruleType: COVERAGE_MANDATE
    effectiveDate: "2024-01-01"
    parameters:
      requiredCoverageLevel: PARTIAL
      appliesTo:
        treatmentTypes: [EMERGENCY]
