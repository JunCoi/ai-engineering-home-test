country: Vietnam
countryCode: vietnam
rules:
  - ruleId: VN-DOC-001
    description: Medical receipt is required for all claims
    ruleType: DOCUMENT_REQUIREMENT
    effectiveDate: "2024-01-01"
    parameters:
      requiredDocuments: [MEDICAL_RECEIPT]
  - ruleId: VN-DOC-002
    description: Hospital certificate is required for INPATIENT claims
    ruleType: DOCUMENT_REQUIREMENT
    effectiveDate: "2024-01-01"
    parameters:
      requiredDocuments: [HOSPITAL_CERTIFICATE]
      appliesTo:
        claimTypes: [INPATIENT]
  - ruleId: VN-DOC-003
    description: ID card copy is required for all claims
    ruleType: DOCUMENT_REQUIREMENT
    effectiveDate: "2024-01-01"
    parameters:
      requiredDocuments: [ID_CARD_COPY]
  - ruleId: VN-SLA-001
    description: All claims must be processed within 10 business days
    ruleType: SLA_CHECK
    effectiveDate: "2024-01-01"
    parameters:
      maxBusinessDays: 10
  - ruleId: VN-WAIT-GEN-001
    description: General claims require a 30-day waiting period
    ruleType: WAITING_PERIOD
    effectiveDate: "2024-01-01"
    parameters:
      minimumPolicyAgeDays: 30
      appliesTo:
        conditionTypes: [GENERAL]
  - ruleId: VN-WAIT-PEC-001
    description: Pre-existing condition claims require a 365-day waiting period
    ruleType: WAITING_PERIOD
    effectiveDate: "2024-01-01"
    parameters:
      minimumPolicyAgeDays: 365
      appliesTo:
        conditionTypes: [PRE_EXISTING]
  - ruleId: VN-MASK-001
    description: Full name must be masked in external reports
    ruleType: DATA_MASKING
    effectiveDate: "2024-01-01"
    parameters:
      field: fullName
      reportContext: external
  - ruleId: VN-COV-001
    description: Maternity must be covered for policies older than 12 months
    ruleType: COVERAGE_MANDATE
    effectiveDate: "2024-01-01"
    parameters:
      minimumPolicyAgeDays: 365
      requiredCoverageLevel: PARTIAL
      appliesTo:
        treatmentTypes: [MATERNITY]
